name: Validate plugin

on:
  push:
    branches: [main]
    paths: ['pushward-unraid.plg', 'src/**', 'build-plg.sh', '.github/workflows/validate-plg.yml']
  pull_request:
    paths: ['pushward-unraid.plg', 'src/**', 'build-plg.sh', '.github/workflows/validate-plg.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Check pushward-unraid.plg is in sync with src/
        run: |
          bash build-plg.sh /tmp/rebuilt.plg >/dev/null
          if ! diff -u pushward-unraid.plg /tmp/rebuilt.plg; then
            echo "::error::pushward-unraid.plg is stale. Run ./build-plg.sh and commit the result."
            exit 1
          fi

      - name: Install validators
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libxml2-utils shellcheck php-cli >/dev/null

      - name: Validate XML
        run: xmllint --noout pushward-unraid.plg

      - name: Extract, shellcheck and php-lint the embedded scripts
        run: |
          set -euo pipefail
          mkdir -p /tmp/plg
          # Extract every <FILE Name="..."> CDATA payload into /tmp/plg/<basename>.
          python3 - <<'PY'
          import re
          plg = open('pushward-unraid.plg').read()
          for name, body in re.findall(r'Name="([^"]+)"[^>]*>\s*<INLINE>\s*<!\[CDATA\[(.*?)\]\]>', plg, re.S):
              base = name.rsplit('/', 1)[-1]
              open('/tmp/plg/' + base, 'w').write(body)
              print('extracted', base)
          PY

          # Bash scripts: syntax + shellcheck.
          for f in PushWard test.sh watchdog.sh test-activity.sh disks_mounted unmounting_disks; do
            echo "== shellcheck $f =="
            bash -n "/tmp/plg/$f"
            shellcheck -s bash "/tmp/plg/$f"
          done

          # PHP files: lint. The .page files have a "header\n---\nbody" layout;
          # strip the header so only the PHP/HTML body is linted.
          for f in pushward-monitor.php pwapi.php; do
            echo "== php -l $f =="
            php -l "/tmp/plg/$f"
          done

          # Exercise the pure steps-index math (the 1-based -> 0-based, clamped
          # conversion the steps template relies on). PUSHWARD_NO_MAIN lets us
          # require the daemon without starting its loop.
          echo "== steps_index assertions =="
          php -r 'define("PUSHWARD_NO_MAIN", 1); require "/tmp/plg/pushward-monitor.php";
            foreach ([[0,5,0],[1,5,0],[5,5,4],[3,5,2],[9,5,4],[0,0,0],[1,1,0]] as [$i,$t,$w]) {
              $g = steps_index($i, $t);
              if ($g !== $w) { fwrite(STDERR, "steps_index($i,$t)=$g want $w\n"); exit(1); }
            }
            echo "steps_index ok\n";'
          for p in pushward-settings.page pushward-activities.page; do
            echo "== php -l $p (body) =="
            awk 'f{print} /^---$/{f=1}' "/tmp/plg/$p" > "/tmp/plg/$p.body.php"
            php -l "/tmp/plg/$p.body.php"
          done

          # Embedded page JS is not covered by php -l; syntax-check each <script>.
          for p in pushward-settings.page pushward-activities.page; do
            echo "== node --check $p (js) =="
            perl -0777 -ne 'print $1 while /<script[^>]*>(.*?)<\/script>/sg' "/tmp/plg/$p" > "/tmp/plg/$p.js"
            node --check "/tmp/plg/$p.js"
          done
